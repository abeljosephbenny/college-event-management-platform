<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MakeMyEvent</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
    <div class="logo">MakeMyEvent</div>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="AllEventsByCategory.html">Events</a></li>
    </ul>

    <div class="auth-buttons">
        <a href="signin.html" class="btn-secondary">Sign In</a>
        <a href="signup.html" class="btn-primary">Sign Up</a>
    </div>
</nav>

   <section class="hero">
    <div class="particles"></div>
    <h1 class="shine-text">
        Discover & Manage Campus Events Seamlessly
    </h1>
    <p>Your all-in-one college event discovery and management platform.</p>
    <a href="#events" class="btn-primary">Explore Events</a>
</section>
   <section id="events" class="events-section reveal">
    <h2>Trending Events</h2>
    <div class="events-container" id="eventsContainer"></div>
</section>
<section class="organizer-section">
    <h2>Organizer Panel</h2>
    <button class="btn-primary" onclick="openForm()">Create Event</button>

    <div id="myEvents" class="events-container"></div>
</section>
<section class="admin-section">
    <h2>Admin Approval Panel</h2>
    <div id="adminEvents" class="events-container"></div>
</section>

    <footer>
        <p>© 2026 MakeMyEvent. Built for modern campuses.</p>
    </footer>
    <div id="eventFormModal" class="modal">
    <div class="modal-content">
        <h3>Create Event</h3>
        <input type="text" id="eventTitle" placeholder="Event Title">
        <input type="text" id="eventDate" placeholder="Event Date">
        <textarea id="eventDesc" placeholder="Event Description"></textarea>
        <button onclick="submitEvent()">Submit</button>
        <button onclick="closeForm()">Cancel</button>
    </div>
</div>

</body>
</html>
