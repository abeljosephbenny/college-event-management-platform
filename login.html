<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - MakeMyEvent</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">Campus<strong>Events</strong></a></div>
        <div class="nav-actions">
            <a href="signup.html" class="btn btn-outline">Sign Up</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p>Enter your credentials to access your account.</p>
            
            <form action="profile.html">
                <div class="form-group">
                    <label for="email">College Email</label>
                    <input type="email" id="email" class="form-control" placeholder="student@college.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; margin-bottom: 0;">
                Don't have an account? <a href="signup.html" style="color: var(--accent); font-weight: 500;">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
