<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MakeMyEvent</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">Campus<strong>Events</strong></a></div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline">Log In</a>
        </div>
    </nav>

    <div class="auth-container" style="padding: 4rem 2rem;">
        <div class="auth-card" style="max-width: 500px;">
            <h2>Create an Account</h2>
            <p>Join to register for events or apply to organize them.</p>
            
            <form action="profile.html">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="email">College Email (Unique)</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="role">I am a...</label>
                        <select id="role" class="form-control" required>
                            <option value="Student">Student</option>
                            <option value="Organizer">Event Organizer</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 2;">
                        <label for="department">Department</label>
                        <input type="text" id="department" class="form-control" placeholder="e.g., Computer Science">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="year">Year</label>
                        <input type="number" id="year" class="form-control" min="1" max="5" placeholder="e.g., 3">
                    </div>
                </div>

                <div class="form-group">
                    <label for="admission_number">Admission Number</label>
                    <input type="text" id="admission_number" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>
        </div>
    </div>
</body>
</html>
